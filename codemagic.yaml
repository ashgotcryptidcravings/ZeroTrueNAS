workflows:
  ios-workflow:
    name: ZeroTrueNAS iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: gQO-QZ92H1-2lxwQ38p7KkVPRt43bxkUAR0rl2fW45Y
    environment:
      ios_signing:
        distribution_type: development
        bundle_identifier: com.zerotruenas.app
      vars:
        BUNDLE_ID: "com.zerotruenas.app"
        XCODE_WORKSPACE: "ZeroTrueNAS.xcodeproj"
        XCODE_SCHEME: "ZeroTrueNAS"
    scripts:
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
